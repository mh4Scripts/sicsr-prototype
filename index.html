const { useState, useMemo, useEffect, useRef } = React;

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */

const Chip = ({ children, variant = 'cream', className = '' }) => {
  const styles = {
    cream: 'bg-cream text-ink',
    blue: 'bg-blue text-white',
    bluelight: 'bg-blue-light text-ink',
    tan: 'bg-tan text-ink',
    ghost: 'bg-white text-muted border border-line',
    success: 'bg-green-100 text-green-800',
    warning: 'bg-orange-100 text-orange-800',
  };
  return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-semibold ${styles[variant]} ${className}`}>{children}</span>;
};

const Btn = ({ children, onClick, variant = 'primary', className = '', ...props }) => {
  const styles = {
    primary: 'bg-blue text-white hover:bg-blue-dark shadow-soft',
    secondary: 'bg-blue-light text-ink hover:bg-blue/80',
    ghost: 'bg-white text-ink border border-line-dark hover:bg-softbg',
    cream: 'bg-cream text-ink hover:bg-cream/80',
  };
  return (
    <button onClick={onClick} className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all active:scale-[0.98] ${styles[variant]} ${className}`} {...props}>
      {children}
    </button>
  );
};

const StatCard = ({ label, value, delta, accent = 'blue', icon }) => {
  const accentColors = {
    blue: 'bg-blue', bluelight: 'bg-blue-light', cream: 'bg-cream', tan: 'bg-tan'
  };
  return (
    <div className="bg-white border border-line rounded-xl p-4 relative overflow-hidden shadow-soft">
      <div className={`absolute left-0 top-0 bottom-0 w-1 ${accentColors[accent]}`}></div>
      <div className="flex items-start justify-between">
        <div>
          <p className="text-[10px] font-semibold text-muted uppercase tracking-wider">{label}</p>
          <p className="text-2xl font-bold mt-1 text-ink">{value}</p>
          {delta && <p className="text-xs text-green-600 font-medium mt-1">{delta}</p>}
        </div>
        {icon && <div className="text-2xl opacity-70">{icon}</div>}
      </div>
    </div>
  );
};

/* ============================================================
   TOAST NOTIFICATION SYSTEM
   ============================================================ */
const ToastContext = React.createContext();
const useToast = () => React.useContext(ToastContext);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const show = (message, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  };
  return (
    <ToastContext.Provider value={{ show }}>
      {children}
      <div className="fixed bottom-6 right-6 space-y-2 z-50">
        {toasts.map(t => (
          <div key={t.id} className={`toast-enter px-4 py-3 rounded-lg shadow-lift bg-white border-l-4 ${t.type === 'success' ? 'border-green-500' : 'border-orange-500'} max-w-sm`}>
            <div className="flex items-center gap-2">
              <span className="text-lg">{t.type === 'success' ? '✓' : '⚠'}</span>
              <span className="text-sm font-medium text-ink">{t.message}</span>
            </div>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
};

const KatalogProgramPage = ({ onNavigate }) => {

  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('default');

  const filtered = useMemo(() => {
    let result = ALL_PROGRAMS;
    if (filter !== 'Semua') result = result.filter(p => p.cat === filter);
    if (search) result = result.filter(p =>
      p.title.toLowerCase().includes(search.toLowerCase()) ||
      p.loc.toLowerCase().includes(search.toLowerCase())
    );
    if (sortBy === 'budget-high') result = [...result].sort((a, b) => b.budget - a.budget);
    if (sortBy === 'budget-low') result = [...result].sort((a, b) => a.budget - b.budget);
    if (sortBy === 'committed') result = [...result].sort((a, b) => b.committed - a.committed);
    return result;
  }, [filter, search, sortBy]);

  const categories = ['Semua', 'Pendidikan', 'Kesehatan', 'Ekonomi', 'Infrastruktur', 'Lingkungan'];

  return (

                <button key={c} onClick={() => setFilter(c)}
                  className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all flex-shrink-0 ${filter === c ? 'bg-blue text-white' : 'bg-white text-ink border border-line hover:border-line-dark'}`}>
                  {c}

          {filtered.length === 0 ? (
            <div className="bg-softbg rounded-xl p-16 text-center">
              <div className="text-4xl mb-3">🔍</div>
              <p className="text-ink font-semibold">Tidak ada program yang cocok</p>
              <p className="text-sm text-muted mt-1">Coba ubah filter atau kata kunci pencarian</p>

                const chipVariant = { blue: 'blue', bluelight: 'bluelight', cream: 'cream', tan: 'cream' }[p.color];

/* ============================================================
   APP ROOT
   ============================================================ */
const App = () => {
  const [page, setPageRaw] = useState('landing');
  const [history, setHistory] = useState(['landing']);
  const [persona, setPersona] = useState('admin');
  const [tourMode, setTourMode] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [demoNavOpen, setDemoNavOpen] = useState(false);

  // Navigate with history tracking
  const navigate = (target) => {
    if (target === page) return;
    setPageRaw(target);
    setHistory(prev => [...prev, target]);
  };

  // Back button - pop last from history
  const goBack = () => {
    if (history.length <= 1) return;
    const newHistory = history.slice(0, -1);
    setHistory(newHistory);
    setPageRaw(newHistory[newHistory.length - 1]);
  };

  // Home - reset history
  const goHome = () => {
    setPageRaw('landing');
    setHistory(['landing']);
    setTourMode(false);
  };

  // Tour navigation
  const tourPrev = () => {
    const idx = DEMO_TOUR.indexOf(page);
    if (idx > 0) navigate(DEMO_TOUR[idx - 1]);
  };
  const tourNext = () => {
    const idx = DEMO_TOUR.indexOf(page);
    if (idx !== -1 && idx < DEMO_TOUR.length - 1) navigate(DEMO_TOUR[idx + 1]);
  };

  // Quick jump shortcuts (1-9)
  const quickJumpMap = {
    '1': 'landing', '2': 'login', '3': 'dashboard', '4': 'katalog-admin',
    '5': 'matchmaking', '6': 'laporan', '7': 'award', '8': 'dashboard-pt', '9': 'transparansi',
  };

  // Keyboard handler
  useEffect(() => {
    const handler = (e) => {
      // Ignore when user is typing in input/textarea
      if (e.target.matches('input, textarea, select')) return;
      // Ignore if modal open (let modal handle its own keys)
      if (helpOpen && e.key !== '/' && e.key !== 'Escape') return;

      if (e.key === 'h' || e.key === 'H') { e.preventDefault(); goHome(); }
      else if (e.key === 't' || e.key === 'T') { e.preventDefault(); setTourMode(m => !m); }
      else if (e.key === '/') { e.preventDefault(); setHelpOpen(h => !h); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); setDemoNavOpen(o => !o); }
      else if (e.key === 'Escape') {
        if (helpOpen) setHelpOpen(false);
        else if (demoNavOpen) setDemoNavOpen(false);
        else goBack();
      }
      else if (tourMode && e.key === 'ArrowLeft') { e.preventDefault(); tourPrev(); }
      else if (tourMode && e.key === 'ArrowRight') { e.preventDefault(); tourNext(); }
      else if (quickJumpMap[e.key]) { e.preventDefault(); navigate(quickJumpMap[e.key]); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [history, page, tourMode, helpOpen, demoNavOpen]);

  useEffect(() => {
    window.scrollTo(0, 0);
  }, [page]);

  const renderPage = () => {
    switch (page) {
      case 'landing': return <LandingPage onNavigate={navigate} />;
      case 'login': return <LoginPage onNavigate={navigate} setPersona={setPersona} />;
      case 'registrasi': return <RegistrasiPage onNavigate={navigate} />;
      case 'dashboard': return <DashboardBaperida onNavigate={navigate} />;
      case 'dashboard-pt': return <DashboardPerusahaan onNavigate={navigate} />;
      case 'katalog-admin': return <KatalogProgramPage onNavigate={navigate} />;
      case 'katalog-pt': return <KatalogPTPage onNavigate={navigate} />;
      case 'detail': return <DetailProgramPage onNavigate={navigate} />;
      case 'transparansi': return <TransparansiPage onNavigate={navigate} />;
      case 'perusahaan': return <PerusahaanPage onNavigate={navigate} />;
      case 'matchmaking': return <MatchmakingPage onNavigate={navigate} />;
      case 'mou': return <MoUPage onNavigate={navigate} />;
      case 'laporan': return <LaporanPage onNavigate={navigate} />;
      case 'monitoring': return <MonitoringPage onNavigate={navigate} />;
      case 'award': return <AwardPage onNavigate={navigate} />;
      case 'notifikasi': return <NotifikasiPage onNavigate={navigate} />;
      case 'pengaturan': return <PengaturanPage onNavigate={navigate} />;
      default: return <LandingPage onNavigate={navigate} />;
    }
  };

  return (
    <ToastProvider>
      {renderPage()}

      {/* Tour progress bar at top */}
      {tourMode && (
        <div className="fixed top-0 left-0 right-0 h-1 bg-softbg z-40">
          <div className="h-full bg-blue transition-all duration-500"
            style={{ width: `${((DEMO_TOUR.indexOf(page) + 1) / DEMO_TOUR.length) * 100}%` }}></div>
        </div>
      )}

      <FloatingNav
        history={history}
        onBack={goBack}
        onHome={goHome}
        currentPage={page}
        onPrev={tourPrev}
        onNext={tourNext}
        tourMode={tourMode}
        setTourMode={setTourMode}
      />

      <DemoControls
        currentPage={page}
        onNavigate={navigate}
        persona={persona}
        setPersona={setPersona}
        externalOpen={demoNavOpen}
        setExternalOpen={setDemoNavOpen}
      />

      {/* Help button bottom-right corner (di atas DemoControls) */}
      <button
        onClick={() => setHelpOpen(true)}
        className="fixed bottom-[76px] right-6 z-30 w-9 h-9 rounded-full bg-white shadow-soft border border-line flex items-center justify-center text-sm font-bold text-muted hover:text-ink transition"
        title="Keyboard shortcut (tekan /)">
        ?
      </button>

      <ShortcutHelp visible={helpOpen} onClose={() => setHelpOpen(false)} />
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
